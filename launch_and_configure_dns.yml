---
- name: Launch AWS EC2 instance
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vault/secrets.yml

  tasks:
    - name: Launch EC2 instance
      ec2:
        key_name: "{{ aws_key_name }}"
        instance_type: t2.micro
        image: ami-0abcdef1234567890   # Replace with Amazon Linux 2 AMI
        wait: yes
        group: sg-0123456789abcdef0    # Replace with your security group
        region: "{{ aws_region }}"
        count: 1
      register: ec2

    - name: Add new instance to inventory
      add_host:
        hostname: "{{ item.public_ip }}"
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "~/.ssh/{{ aws_key_name }}.pem"
        groups: dns
      loop: "{{ ec2.instances }}"

- name: Configure BIND DNS on EC2
  hosts: dns
  become: yes

  vars:
    dns_dir: /var/named

  tasks:
    - name: Pull setup script from GitHub
      git:
        repo: 'https://github.com/<your-username>/aws-dns-server-kbvsm.git'
        dest: /home/ec2-user/aws-dns-server-kbvsm

    - name: Install BIND and start service
      command: bash /home/ec2-user/aws-dns-server-kbvsm/setup_named.sh

    - name: Deploy named.conf template
      template:
        src: templates/named.conf.j2
        dest: /etc/named.conf
        owner: root
        group: named
        mode: '0644'
      notify: restart named

    - name: Deploy zone file template
      template:
        src: templates/kbvsm.com.db.j2
        dest: "{{ dns_dir }}/kbvsm.com.db"
        owner: root
        group: named
        mode: '0644'
      notify: restart named

    - name: Check named.conf syntax
      command: named-checkconf /etc/named.conf
      register: check_namedconf
      failed_when: check_namedconf.rc != 0

    - name: Check zone file syntax
      command: named-checkzone kbvsm.com /var/named/kbvsm.com.db
      register: check_zone
      failed_when: check_zone.rc != 0

  handlers:
    - name: restart named
      systemd:
        name: named
        state: restarted
        enabled: yes
