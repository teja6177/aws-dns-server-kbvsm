---
- name: Setup Bind DNS
  hosts: dns
  become: yes
  gather_facts: yes
  vars:
    domain_name: kbvsm.com
    dns_ip: "{{ hostvars['localhost']['ec2_output'].instances[0].private_ip_address }}"
    serial: "{{ lookup('pipe','date +%Y%m%d%H') }}"
    records:
      - { name: 'www', ip: '{{ dns_ip }}' }
      - { name: 'app', ip: '{{ dns_ip }}' }
      - { name: 'mail', ip: '{{ dns_ip }}' }

  tasks:
    - name: Install Bind
      yum:
        name: bind
        state: present

    - name: Deploy named.conf
      copy:
        src: ../files/named.conf
        dest: /etc/named.conf
        owner: root
        group: root
        mode: '0644'

    - name: Deploy initial zone file
      template:
        src: ../templates/kbvsm.com.zone.j2
        dest: "/var/named/{{ domain_name }}.zone"
        owner: root
        group: root
        mode: '0644'

    - name: Ensure named service is running
      service:
        name: named
        state: started
        enabled: yes
