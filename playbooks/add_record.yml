---
- name: Add A records dynamically
  hosts: dns
  become: yes
  gather_facts: yes
  vars:
    domain_name: kbvsm.com
    dns_ip: "{{ hostvars['localhost']['ec2_output'].instances[0].private_ip_address }}"
    serial: "{{ lookup('pipe','date +%Y%m%d%H') }}"
    records:
      - { name: 'www', ip: '{{ dns_ip }}' }
      - { name: 'app', ip: '{{ dns_ip }}' }
      - { name: 'mail', ip: '{{ dns_ip }}' }
      - { name: 'newservice', ip: '10.0.0.50' }  # Add your new record here

  tasks:
    - name: Update zone file
      template:
        src: ../templates/kbvsm.com.zone.j2
        dest: "/var/named/{{ domain_name }}.zone"
        owner: root
        group: root
        mode: '0644'

    - name: Reload named
      command: rndc reload
      ignore_errors: yes
