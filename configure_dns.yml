---
- name: Configure BIND DNS on EC2
  hosts: dns
  become: yes

  vars_files:
    - vault/secrets.yml

  vars:
    dns_dir: /var/named

  tasks:
    - name: Pull setup script from GitHub
      git:
        repo: 'https://github.com/<your-username>/aws-dns-server-kbvsm.git'
        dest: /home/ec2-user/aws-dns-server-kbvsm

    - name: Install BIND and start service
      command: bash /home/ec2-user/aws-dns-server-kbvsm/setup_named.sh

    - name: Deploy named.conf template
      template:
        src: templates/named.conf.j2
        dest: /etc/named.conf
        owner: root
        group: named
        mode: '0644'
      notify: restart named

    - name: Deploy zone file template
      template:
        src: templates/kbvsm.com.db.j2
        dest: "{{ dns_dir }}/kbvsm.com.db"
        owner: root
        group: named
        mode: '0644'
      notify: restart named

    - name: Check named.conf syntax
      command: named-checkconf /etc/named.conf
      register: check_namedconf
      failed_when: check_namedconf.rc != 0

    - name: Check zone file syntax
      command: named-checkzone kbvsm.com /var/named/kbvsm.com.db
      register: check_zone
      failed_when: check_zone.rc != 0

  handlers:
    - name: restart named
      systemd:
        name: named
        state: restarted
        enabled: yes
