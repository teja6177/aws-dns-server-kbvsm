---
- name: Launch DNS EC2 instance
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    domain_name: kbvsm.com
  tasks:
    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: dns-server
        instance_type: t2.micro
        image_id: ami-0f58b397bc5c1f2e8
        key_name: your-key
        region: ap-south-1
        security_group: dns-sg
        wait: yes
      register: ec2_output

    - name: Add EC2 instance to dynamic inventory
      add_host:
        name: "{{ ec2_output.instances[0].public_ip_address }}"
        groups: dns
        ansible_user: ec2-user
        ansible_ssh_private_key_file: key.pem
