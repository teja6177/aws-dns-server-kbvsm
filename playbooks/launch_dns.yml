---
- name: Launch DNS EC2 instance with security group
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    domain_name: kbvsm.com
    region: ap-south-1
    key_name: honorlaptop           # Replace with your AWS key
    vpc_id: vpc-0db825702939b11a0              # Replace with your VPC ID
    subnet_id: subnet-06dba24b763624c5e        # Replace with a subnet in that VPC
    sg_name: dns-sg
    ami_id: ami-0f58b397bc5c1f2e8    # Replace with your CentOS AMI
    instance_type: t2.micro

  tasks:

    - name: Create DNS security group
      amazon.aws.ec2_group:
        name: "{{ sg_name }}"
        description: Security group for DNS server
        vpc_id: "{{ vpc_id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            from_port: 0
            to_port: 0
            cidr_ip: 10.0.0.0/8      # SSH
          - proto: tcp
            from_port: 0
            to_port: 0
            cidr_ip: 172.16.0.0/12      # DNS TCP
          - proto: udp
            from_port: 0
            to_port: 0
            cidr_ip: 192.168.0.0/16      # DNS UDP
        rules_egress:
          - proto: -1
            cidr_ip: 0.0.0.0/0
        state: present
      register: dns_sg

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: dns-server
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        key_name: "{{ key_name }}"
        region: "{{ region }}"
        security_group: "{{ sg_name }}"
        subnet_id: subnet-06dba24b763624c5e     # Must provide a valid subnet
        wait: yes
      register: ec2_output

    - name: Debug EC2 output
      debug:
        var: ec2_output  

    - name: Add EC2 instance to dynamic inventory
      add_host:
        name: "{{ ec2_output.instances[0].private_ip_address }}"
        groups: dns
        ansible_user: ec2-user
        ansible_ssh_private_key_file: key.pem
      when: ec2_output.instances[0].network_interfaces is defined

    - name: Show instance info
      debug:
        msg: |
          EC2 instance launched successfully!
          Public IP: {{ ec2_output.instances[0].public_ip_address }}
          Private IP: {{ ec2_output.instances[0].private_ip_address }}
          Instance ID: {{ ec2_output.instances[0].instance_id }}
